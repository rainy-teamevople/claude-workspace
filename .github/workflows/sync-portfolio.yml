name: Sync Portfolio to Public Repo

on:
  push:
    branches: [master]
    paths:
      - 'portfolio/**'
      - 'todo-app/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    # [skip ci] 커밋이 트리거한 경우 무한루프 방지
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout claude-workspace
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build todo-app
        run: |
          cd todo-app
          npm install
          npm run build

      - name: Update portfolio/todo in claude-workspace
        run: |
          git config user.email "rainy@teamevople.kr"
          git config user.name "rainy-teamevople"
          mkdir -p portfolio/todo
          rsync -av --delete todo-app/dist/ portfolio/todo/
          git add portfolio/todo/
          git diff --staged --quiet || git commit -m "chore: todo-app 빌드 결과 자동 업데이트 [skip ci]"
          git push origin master

      - name: Sync to teamevople-portfolio
        run: |
          git config --global user.email "rainy@teamevople.kr"
          git config --global user.name "rainy-teamevople"

          git clone https://x-access-token:${{ secrets.PORTFOLIO_DEPLOY_TOKEN }}@github.com/rainy-teamevople/teamevople-portfolio.git /tmp/portfolio-repo

          rsync -av --delete \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            portfolio/ /tmp/portfolio-repo/

          cd /tmp/portfolio-repo
          git add .
          git diff --staged --quiet || git commit -m "sync: update from claude-workspace @ $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
